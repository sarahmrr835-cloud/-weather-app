<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="weather.css">
</head>

<body>
    <div id="weather-container">
        <img src="weather.png" alt="Weather" id="weather-logo">
        <h1>Weather</h1>
        <input type="text" id="city-input" placeholder="Enter city name">
        <button id="search-button">Search</button>
        <h2><span id="city"></span></h2>
        <img id="weather-image" width="100" height="100">
        <p><b>Temperature:</b> <span id="temperature"></span>°C</p>
        <p><b>Condition:</b> <span id="weather-condition"></span></p>
        <p><b>Wind Speed:</b> <span id="wind-speed"></span> km/h</p>
    </div>
    <script src="weather.js"></script>
</body>

</html>
